<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Arial', sans-serif; background: transparent; overflow: hidden; }
        .container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        #translatedText { 
            color: #ffffff; 
            font-size: 40px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
            line-height: 1.2;
        }
        #originalText { color: #aaaaaa; font-size: 20px; text-shadow: 1px 1px 2px black; }
        .status { color: #555; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="translatedText">Нажмите для старта...</div>
        <div id="originalText"></div>
        <div class="status" id="status">Ожидание...</div>
    </div>

<script>
    console.log("Скрипт загружен");
    
    // ⚠️ ВСТАВЬТЕ ВАШ API КЛЮЧ DEEPSEEK ЗДЕСЬ:
    const DEEPSEEK_API_KEY = 'sk-2c984ced6a9b41449254fc4bdf0dbab9';
    
    const translatedEl = document.getElementById('translatedText');
    const originalEl = document.getElementById('originalText');
    const statusEl = document.getElementById('status');

    let recognition;

    async function translate(text) {
        console.log("Запрос к DeepSeek для:", text);
        statusEl.innerText = "Перевод...";
        
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        {
                            role: "system",
                            content: "You are a translator. Translate the following Russian text to English. Return only the translation, no explanations."
                        },
                        {
                            role: "user",
                            content: text
                        }
                    ],
                    temperature: 0.3,
                    max_tokens: 500
                })
            });
            
            const data = await response.json();
            console.log("Ответ DeepSeek:", data);
            
            if (data.choices && data.choices[0] && data.choices[0].message) {
                const translation = data.choices[0].message.content;
                translatedEl.innerText = translation;
                statusEl.innerText = "Работает";
            } else {
                console.error("Ошибка API:", data);
                statusEl.innerText = `Ошибка: ${data.error?.message || "нет ответа"}`;
                translatedEl.innerText = "Ошибка перевода";
            }
        } catch (e) {
            console.error("Ошибка при запросе:", e);
            statusEl.innerText = "Ошибка запроса";
            translatedEl.innerText = "Проверьте API ключ";
        }
    }

    function init() {
        console.log("Инициализация...");
        
        // Проверка API ключа
        if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'sk-ваш-ключ-здесь') {
            statusEl.innerText = "❌ Вставьте API ключ DeepSeek в код!";
            translatedEl.innerText = "Нужен API ключ";
            return;
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { 
            alert("Ваш браузер не поддерживает распознавание речи!"); 
            return; 
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onstart = () => {
            console.log("Распознавание запущено");
            statusEl.innerText = "🎤 Слушаю...";
        };
        
        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript;
            console.log("Распознано:", text);
            originalEl.innerText = text;
            translate(text);
        };
        
        recognition.onerror = (e) => {
            console.error("Ошибка распознавания:", e.error);
            statusEl.innerText = `Ошибка микрофона: ${e.error}`;
        };
        
        recognition.onend = () => {
            console.log("Распознавание остановлено, перезапуск...");
            statusEl.innerText = "🔄 Перезапуск...";
            recognition.start();
        };

        recognition.start();
    }

    document.body.addEventListener('click', () => {
        console.log("Клик получен");
        init();
    }, { once: true });
</script>
</body>
</html>
