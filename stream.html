<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Arial', sans-serif; background: transparent; overflow: hidden; }
        .container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        #translatedText { 
            color: #ffffff; 
            font-size: 40px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
            line-height: 1.2;
        }
        #originalText { color: #aaaaaa; font-size: 20px; text-shadow: 1px 1px 2px black; }
        .status { color: #555; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="translatedText">Нажмите для старта...</div>
        <div id="originalText"></div>
        <div class="status" id="status">Ожидание...</div>
    </div>

<script>
    console.log("Скрипт загружен");
    const API_KEY = 'AIzaSyDeAl68QSR7be_9DOlI_DVr4ETxXldtWTw'; // Убедитесь, что он актуален
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    const translatedEl = document.getElementById('translatedText');
    const originalEl = document.getElementById('originalText');
    const statusEl = document.getElementById('status');

    let recognition;

    async function translate(text) {
        console.log("Запрос к API для:", text);
        statusEl.innerText = "Перевод...";
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{parts: [{text: `Translate to English: ${text}`}]}]
                })
            });
            const data = await response.json();
            console.log("Ответ API:", data);
            
            if (data.candidates) {
                const translation = data.candidates[0].content.parts[0].text;
                translatedEl.innerText = translation;
                statusEl.innerText = "Работает";
            } else {
                statusEl.innerText = "Ошибка: нет кандидатов";
            }
        } catch (e) {
            console.error("Ошибка при запросе:", e);
            statusEl.innerText = "Ошибка запроса";
        }
    }

    function init() {
        console.log("Инициализация...");
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { 
            alert("Ваш браузер не поддерживает распознавание речи!"); 
            return; 
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onstart = () => console.log("Распознавание запущено");
        recognition.onresult = (event) => {
            const text = event.results[event.results.length - 1][0].transcript;
            console.log("Распознано:", text);
            originalEl.innerText = text;
            translate(text);
        };
        recognition.onerror = (e) => console.error("Ошибка распознавания:", e.error);
        recognition.onend = () => {
            console.log("Распознавание остановлено, перезапуск...");
            recognition.start();
        };

        recognition.start();
        statusEl.innerText = "Микрофон включен";
    }

    document.body.addEventListener('click', () => {
        console.log("Клик получен");
        init();
    }, { once: true });
</script>
</body>
</html>
