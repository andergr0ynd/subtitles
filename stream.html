<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Arial', sans-serif; background: transparent; overflow: hidden; }
        .container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        #translatedText { 
            color: #ffffff; 
            font-size: 40px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
            word-wrap: break-word;
        }
        #originalText { color: #aaaaaa; font-size: 20px; margin-top: 10px; word-wrap: break-word; }
        .status { color: #ff9800; font-size: 12px; margin-top: 5px; }
        button {
            margin-top: 15px;
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        button:active { transform: scale(0.98); }
        .warning {
            background: rgba(255,100,100,0.3);
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 12px;
            color: #ffaaaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="translatedText">Нажмите кнопку и говорите</div>
        <div id="originalText"></div>
        <div class="status" id="status">Готов к работе</div>
        <button id="recordBtn">🎤 Нажать и говорить</button>
        <div class="warning" id="warning" style="display:none;"></div>
    </div>

<script>
    console.log("Скрипт загружен");
    
    // ⚠️ ВСТАВЬТЕ ВАШ API КЛЮЧ DEEPSEEK ЗДЕСЬ:
    const DEEPSEEK_API_KEY = 'sk-3ad63b94127247bb92588ee93f61a0ec';
    
    const translatedEl = document.getElementById('translatedText');
    const originalEl = document.getElementById('originalText');
    const statusEl = document.getElementById('status');
    const recordBtn = document.getElementById('recordBtn');
    const warningEl = document.getElementById('warning');
    
    let mediaRecorder;
    let audioChunks = [];

    async function translate(text) {
        console.log("Запрос к DeepSeek для:", text);
        statusEl.innerText = "Перевод...";
        translatedEl.innerText = "🔄 Перевод...";
        
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [
                        {
                            role: "system",
                            content: "You are a translator. Translate the following Russian text to English. Return only the translation, no explanations."
                        },
                        {
                            role: "user",
                            content: text
                        }
                    ],
                    temperature: 0.3,
                    max_tokens: 500
                })
            });
            
            const data = await response.json();
            console.log("Ответ DeepSeek:", data);
            
            if (data.choices && data.choices[0] && data.choices[0].message) {
                const translation = data.choices[0].message.content;
                translatedEl.innerText = translation;
                statusEl.innerText = "✅ Готов";
            } else {
                console.error("Ошибка API:", data);
                statusEl.innerText = "❌ Ошибка API";
                translatedEl.innerText = "Ошибка перевода";
                if (data.error) warningEl.innerText = `API Error: ${data.error.message}`;
            }
        } catch (e) {
            console.error("Ошибка при запросе:", e);
            statusEl.innerText = "❌ Ошибка сети";
            translatedEl.innerText = "Проверьте интернет";
        }
    }

    // Альтернативное распознавание с явным запросом микрофона
    let recognition = null;
    let isRecording = false;
    
    function startSpeechRecognition() {
        // Проверяем поддержку
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            statusEl.innerText = "❌ Браузер не поддерживает распознавание речи";
            warningEl.innerText = "Используйте Chrome, Edge или Safari";
            warningEl.style.display = "block";
            return false;
        }
        
        // Создаем новое распознавание
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false; // Однократное распознавание
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = () => {
            console.log("Распознавание началось");
            statusEl.innerText = "🎤 Слушаю... говорите";
            recordBtn.textContent = "🔴 Слушаю...";
            recordBtn.style.background = "#f44336";
            isRecording = true;
        };
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            console.log("Распознано:", text);
            originalEl.innerText = text;
            statusEl.innerText = "✅ Распознано! Перевожу...";
            translate(text);
        };
        
        recognition.onerror = (event) => {
            console.error("Ошибка:", event.error);
            statusEl.innerText = `❌ Ошибка: ${event.error}`;
            recordBtn.textContent = "🎤 Нажать и говорить";
            recordBtn.style.background = "#4CAF50";
            isRecording = false;
            
            if (event.error === 'not-allowed') {
                warningEl.innerText = "❌ Разрешите доступ к микрофону в браузере";
                warningEl.style.display = "block";
            } else if (event.error === 'network') {
                warningEl.innerText = "⚠️ Для голосового ввода откройте страницу через HTTPS или localhost";
                warningEl.style.display = "block";
            }
        };
        
        recognition.onend = () => {
            console.log("Распознавание завершено");
            if (isRecording) {
                recordBtn.textContent = "🎤 Нажать и говорить";
                recordBtn.style.background = "#4CAF50";
                isRecording = false;
                statusEl.innerText = "Готов к работе";
            }
        };
        
        try {
            recognition.start();
            return true;
        } catch(e) {
            console.error("Ошибка запуска:", e);
            statusEl.innerText = "❌ Не удалось запустить";
            return false;
        }
    }
    
    // Кнопка записи
    recordBtn.addEventListener('click', () => {
        if (isRecording && recognition) {
            recognition.stop();
        } else {
            warningEl.style.display = "none";
            startSpeechRecognition();
        }
    });
    
    // Проверка API ключа
    if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'sk-ваш-ключ-здесь') {
        statusEl.innerText = "❌ Вставьте API ключ DeepSeek!";
        translatedEl.innerText = "Нужен API ключ";
        recordBtn.disabled = true;
    }
    
    // Предупреждение о HTTPS
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && !location.hostname.includes('127.0.0.1')) {
        warningEl.innerHTML = "⚠️ <strong>Внимание!</strong> Для голосового ввода нужно открыть страницу через <strong>localhost</strong> или <strong>HTTPS</strong><br>" +
                              "📌 Как исправить:<br>" +
                              "1. Установите Python и выполните: <code>python -m http.server 8000</code><br>" +
                              "2. Затем откройте: <code>http://localhost:8000</code>";
        warningEl.style.display = "block";
        statusEl.innerText = "⚠️ Требуется localhost/HTTPS";
    } else {
        statusEl.innerText = "✅ Нажмите кнопку и говорите по-русски";
    }
</script>
</body>
</html>
